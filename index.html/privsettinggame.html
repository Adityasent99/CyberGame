<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Privacy Settings Navigator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-main: #212121;
      --bg-secondary: #333333;
      --text-primary: #E0E0E0;
      --text-secondary: #BDBDBD;
      --accent: #00e676;
      --accent-dark: #00c853;
      --shadow-color: rgba(0, 230, 118, 0.15);
      --correct-bg: #1B5E20;
      --correct-border: #4CAF50;
      --correct-text: #E8F5E9;
      --incorrect-bg: #B71C1C;
      --incorrect-border: #F44336;
      --incorrect-text: #FFEBEE;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-primary);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .container {
      background: var(--bg-secondary);
      border-radius: 15px;
      max-width: 600px;
      width: 100%;
      padding: 2rem;
      box-sizing: border-box;
      box-shadow: 0 4px 25px var(--shadow-color);
      border: 1px solid #444;
    }
    h1 {
      font-weight: 900;
      font-size: 2rem;
      color: var(--accent);
      text-align:center;
      margin-bottom: 1rem;
    }
    p {
        color: var(--text-secondary);
        text-align: center;
        margin-bottom: 2rem;
        font-size: 1.1rem;
    }
    .welcome-screen, .game-screen, .summary-screen {
      display: none;
    }
    .btn-primary {
      background-color: var(--accent-dark);
      color: var(--bg-main);
      font-weight: 700;
      padding: 12px 24px;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
      font-size: 1.125rem;
      box-shadow: 0 4px 6px rgba(0, 200, 83, 0.2);
      transition: background-color 0.3s, box-shadow 0.3s;
      width: 100%;
    }
    .btn-primary:hover {
      background-color: var(--accent);
    }
    .btn-secondary {
      background-color: transparent;
      color: var(--accent);
      font-weight: 700;
      padding: 12px 24px;
      border-radius: 0.5rem;
      border: 2px solid var(--accent-dark);
      cursor: pointer;
      font-size: 1.125rem;
      width: 100%;
      transition: background-color 0.3s, color 0.3s;
      margin-top: 1rem;
    }
    .btn-secondary:hover {
      background-color: var(--accent-dark);
      color: var(--bg-main);
    }
    .task {
      background-color: #2a2a2a;
      padding: 1rem;
      border-left: 4px solid var(--accent-dark);
      margin-bottom: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
      border-radius: 0.375rem;
      min-height: 70px;
      display: flex;
      align-items: center;
      font-size: 1.125rem;
    }
    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
      padding: 0.75rem 1rem;
      border: 1px solid #555;
      border-radius: 0.375rem;
      cursor: pointer;
      transition: background-color 0.25s ease, border-color 0.25s ease;
      font-weight: 600;
      color: var(--text-primary);
    }
    .setting-item:hover {
      background-color: #424242;
      border-color: var(--accent-dark);
    }
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      display: inline-block;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #555;
      border-radius: 9999px;
      transition: 0.4s;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 9999px;
      transition: 0.4s;
    }
    input:checked + .slider {
      background-color: var(--accent-dark);
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    .feedback {
      margin-top: 1rem;
      font-weight: 600;
      padding: 1rem;
      border-radius: 0.375rem;
      display: none;
      white-space: pre-wrap;
    }
    .feedback.correct {
      background-color: var(--correct-bg);
      border-left: 4px solid var(--correct-border);
      color: var(--correct-text);
    }
    .feedback.incorrect {
      background-color: var(--incorrect-bg);
      border-left: 4px solid var(--incorrect-border);
      color: var(--incorrect-text);
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="welcome-screen" class="welcome-screen" style="display:block;">
      <h1>Privacy Settings Navigator</h1>
      <p>Improve your privacy by setting your account correctly. Ready?</p>
      <button id="start-button" class="btn-primary">Start Now</button>
    </div>

    <div id="game-screen" class="game-screen">
      <div id="task-container" class="task" aria-live="polite"></div>
      <div id="settings-list" role="list" aria-label="Privacy Settings Options"></div>
      <div id="feedback" class="feedback" role="alert" aria-live="assertive"></div>
      <button id="next-btn" class="btn-primary" style="display:none;">Next Task</button>
    </div>

    <div id="summary-screen" class="summary-screen">
      <!-- Filled dynamically -->
    </div>
  </div>

  <script>
    const tasks = [
      {
        prompt: "Make your profile private so only approved friends can see your posts.",
        settingKey: "profilePrivate",
        correctState: true,
        description: "This setting restricts your profile visibility to only approved friends."
      },
      {
        prompt: "Disable third-party apps from accessing your data.",
        settingKey: "thirdPartyAccess",
        correctState: false,
        description: "Disabling third-party app access helps protect your personal information from external apps."
      },
      {
        prompt: "Turn on two-factor authentication (2FA) for extra account security.",
        settingKey: "twoFactorAuth",
        correctState: true,
        description: "Two-factor authentication provides an extra layer of security beyond just your password."
      },
      {
        prompt: "Turn off location sharing with your posts.",
        settingKey: "locationSharing",
        correctState: false,
        description: "Disabling location sharing helps maintain your privacy from people who view your posts."
      },
      {
        prompt: "Limit who can send you friend requests to 'Friends of Friends' only.",
        settingKey: "friendRequestPrivacy",
        correctState: true,
        description: "Restricting friend requests reduces unwanted or spam friend requests."
      }
    ];

    let userSettings = {
      profilePrivate: false,
      thirdPartyAccess: true,
      twoFactorAuth: false,
      locationSharing: true,
      friendRequestPrivacy: false
    };

    let currentTaskIndex = 0;

    const welcomeScreen = document.getElementById('welcome-screen');
    const gameScreen = document.getElementById('game-screen');
    const summaryScreen = document.getElementById('summary-screen');
    const taskContainer = document.getElementById('task-container');
    const settingsList = document.getElementById('settings-list');
    const feedbackEl = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    const startBtn = document.getElementById('start-button');

    startBtn.addEventListener('click', () => {
      welcomeScreen.style.display = 'none';
      gameScreen.style.display = 'block';
      currentTaskIndex = 0;
      createSettingsUI();
      loadTask();
    });

    function createSettingsUI() {
      settingsList.innerHTML = '';
      Object.keys(userSettings).forEach(key => {
        const labelText = {
          profilePrivate: "Profile Privacy: Make profile private",
          thirdPartyAccess: "Third-Party App Access",
          twoFactorAuth: "Two-Factor Authentication (2FA)",
          locationSharing: "Location Sharing in Posts",
          friendRequestPrivacy: "Friend Request Privacy"
        }[key] || key;

        const settingDiv = document.createElement('div');
        settingDiv.classList.add('setting-item');
        settingDiv.setAttribute('role', 'listitem');
        settingDiv.setAttribute('tabindex', '0');

        const label = document.createElement('span');
        label.className = 'setting-label';
        label.textContent = labelText;

        const toggleLabel = document.createElement('label');
        toggleLabel.className = 'toggle-switch';
        toggleLabel.htmlFor = key;

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.id = key;
        checkbox.checked = userSettings[key];
        checkbox.setAttribute('aria-checked', checkbox.checked);
        checkbox.setAttribute('aria-label', labelText);

        const slider = document.createElement('span');
        slider.className = 'slider';

        toggleLabel.appendChild(checkbox);
        toggleLabel.appendChild(slider);

        settingDiv.appendChild(label);
        settingDiv.appendChild(toggleLabel);

        settingDiv.addEventListener('click', (e) => {
            // Prevent double-triggering if the label/slider itself is clicked
            if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'SPAN') {
                 checkbox.checked = !checkbox.checked;
                 checkbox.dispatchEvent(new Event('change'));
            }
        });

        settingDiv.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            checkbox.checked = !checkbox.checked;
            checkbox.dispatchEvent(new Event('change'));
          }
        });

        checkbox.addEventListener('change', () => {
          userSettings[key] = checkbox.checked;
          checkbox.setAttribute('aria-checked', checkbox.checked);
          checkAnswer();
        });

        settingsList.appendChild(settingDiv);
      });
    }

    function loadTask() {
      feedbackEl.style.display = 'none';
      nextBtn.style.display = 'none';
      taskContainer.textContent = tasks[currentTaskIndex].prompt;
      
      // Initially enable all toggles for the new task
      Array.from(settingsList.querySelectorAll('input')).forEach(input => {
        input.disabled = false;
        input.closest('.setting-item').style.cursor = 'pointer';
        input.closest('.setting-item').classList.remove('disabled-setting');
      });

      checkAnswer(false); // Check answer without showing feedback on load
    }
    
    function checkAnswer(showFeedback = true) {
        const task = tasks[currentTaskIndex];
        const allToggles = Array.from(settingsList.querySelectorAll('input'));
        
        if(userSettings[task.settingKey] === task.correctState){
            if (showFeedback) {
                feedbackEl.textContent = `Good job! ${task.description}`;
                feedbackEl.classList.remove('incorrect');
                feedbackEl.classList.add('correct');
                feedbackEl.style.display = 'block';
            }
            nextBtn.style.display = 'block';
            
            // Disable all other toggles
            allToggles.forEach(input => {
                const settingItem = input.closest('.setting-item');
                if(input.id !== task.settingKey){
                    input.disabled = true;
                    settingItem.style.cursor = 'not-allowed';
                }
            });
        } else {
             if (showFeedback) {
                feedbackEl.textContent = `That’s not quite right. Review the task and try adjusting the settings again.`;
                feedbackEl.classList.remove('correct');
                feedbackEl.classList.add('incorrect');
                feedbackEl.style.display = 'block';
             } else {
                 feedbackEl.style.display = 'none';
             }
            nextBtn.style.display = 'none';
        }
    }


    nextBtn.addEventListener('click', () => {
      currentTaskIndex++;
      if(currentTaskIndex >= tasks.length){
        showCompletion();
        return;
      }
      loadTask();
    });

    function showCompletion() {
      gameScreen.style.display = 'none';
      summaryScreen.style.display = 'block';
      summaryScreen.innerHTML = `
        <h1>All Tasks Complete!</h1>
        <p style="font-size:1.1rem; margin-top:1rem; text-align:center;">Great work securing your account! Keep these settings in mind whenever you update your preferences.</p>
        <button id="play-again-btn" class="btn-primary">Play Again</button>
        <button id="go-home-btn" class="btn-secondary">Go to Main Screen</button>
      `;
      
      document.getElementById('play-again-btn').addEventListener('click', () => {
        summaryScreen.style.display = 'none';
        welcomeScreen.style.display = 'block';
        userSettings = {
          profilePrivate: false,
          thirdPartyAccess: true,
          twoFactorAuth: false,
          locationSharing: true,
          friendRequestPrivacy: false
        };
      });
      
      document.getElementById('go-home-btn').addEventListener('click', () => {
        window.location.href = 'main.html';
      });
    }

    // Initial setup to handle event listener on checkboxes
    document.addEventListener('DOMContentLoaded', () => {
       // This will ensure logic runs after the whole page is loaded.
       // The 'change' event on checkboxes is sufficient and is set up in createSettingsUI
    });
  </script>
</body>
</html>
